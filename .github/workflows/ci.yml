name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  python-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run compile checks
        run: |
          python -m compileall app
          python -m py_compile frontend/streamlit_app.py

      - name: Run tests
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Compose config
        run: OPENAI_API_KEY=dummy docker compose config

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t azure-genai-backend:test .

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t azure-genai-frontend:test .
