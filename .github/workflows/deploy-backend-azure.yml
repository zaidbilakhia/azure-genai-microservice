name: Deploy Backend to Azure Container Apps

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'rg-azure-genai-microservice' }}
      AZURE_CONTAINER_REGISTRY: ${{ vars.AZURE_CONTAINER_REGISTRY || 'acrgenaimicroservice' }}
      AZURE_CONTAINER_APP_ENV: ${{ vars.AZURE_CONTAINER_APP_ENV || 'cae-azure-genai-microservice' }}
      AZURE_BACKEND_APP_NAME: ${{ vars.AZURE_BACKEND_APP_NAME || 'ca-azure-genai-backend' }}
      AZURE_BACKEND_IMAGE_NAME: ${{ vars.AZURE_BACKEND_IMAGE_NAME || 'azure-genai-backend' }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
      LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get ACR login server
        run: |
          ACR_LOGIN_SERVER="$(az acr show --name "$AZURE_CONTAINER_REGISTRY" --query loginServer -o tsv)"
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> "$GITHUB_ENV"

      - name: Login to Azure Container Registry
        run: az acr login --name "$AZURE_CONTAINER_REGISTRY"

      - name: Build and push backend image
        run: |
          docker build \
            -f Dockerfile.backend \
            -t "$ACR_LOGIN_SERVER/$AZURE_BACKEND_IMAGE_NAME:${GITHUB_SHA}" \
            -t "$ACR_LOGIN_SERVER/$AZURE_BACKEND_IMAGE_NAME:latest" \
            .
          docker push "$ACR_LOGIN_SERVER/$AZURE_BACKEND_IMAGE_NAME:${GITHUB_SHA}"
          docker push "$ACR_LOGIN_SERVER/$AZURE_BACKEND_IMAGE_NAME:latest"

      - name: Set OpenAI API key secret
        run: |
          az containerapp secret set \
            --name "$AZURE_BACKEND_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --secrets openai-api-key="${{ secrets.OPENAI_API_KEY }}"

      - name: Deploy backend Container App
        run: |
          az containerapp update \
            --name "$AZURE_BACKEND_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$ACR_LOGIN_SERVER/$AZURE_BACKEND_IMAGE_NAME:${GITHUB_SHA}" \
            --set-env-vars OPENAI_API_KEY=secretref:openai-api-key OPENAI_MODEL="$OPENAI_MODEL" LOG_LEVEL="$LOG_LEVEL"

      - name: Print backend URL
        run: |
          FQDN="$(az containerapp show \
            --name "$AZURE_BACKEND_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query properties.configuration.ingress.fqdn \
            -o tsv)"
          echo "Backend URL: https://${FQDN}"
