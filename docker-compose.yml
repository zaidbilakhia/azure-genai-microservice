services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: azure-genai-backend
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: azure-genai-frontend
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
